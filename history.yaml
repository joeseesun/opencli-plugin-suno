site: suno
name: history
description: 获取 Suno 最近生成的歌曲列表
domain: suno.com
strategy: cookie
browser: true

args:
  limit:
    type: int
    default: 20
    description: "获取歌曲的数量"

columns: [id, status, title, model, tags, audio_url, created_at]

pipeline:
  - navigate: https://suno.com/create
  - wait: 3
  - evaluate: |
      (async () => {
        try {
          let token = null;
          if (window.Clerk && window.Clerk.session) {
            token = await window.Clerk.session.getToken();
          }
          if (!token) throw new Error('JWT Token not found. Please log in to Suno in Chrome.');

          const response = await fetch('https://studio-api.prod.suno.com/api/feed/?page=0', {
            headers: { 'Authorization': `Bearer ${token}` }
          });

          if (!response.ok) {
             throw new Error(`Fetch failed: ${response.status} - ${await response.text()}`);
          }

          const data = await response.json();
          if (!data || !Array.isArray(data)) return [];

          return data.map(item => ({
            id: item.id,
            status: item.status,
            title: item.title || 'Untitled',
            model: item.model_name,
            tags: item.metadata?.tags || '',
            audio_url: item.audio_url || '',
            created_at: item.created_at
          }));
        } catch (e) {
          return [{ id: 'error', status: 'error', title: e.message }];
        }
      })()
  - limit: ${{ args.limit }}
  - map:
      id: ${{ item.id }}
      status: ${{ item.status }}
      title: ${{ item.title }}
      model: ${{ item.model }}
      tags: ${{ item.tags }}
      audio_url: ${{ item.audio_url }}
      created_at: ${{ item.created_at }}
